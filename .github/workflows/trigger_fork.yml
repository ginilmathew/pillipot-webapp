name: Trigger Fork Sync
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ping_fork:
    runs-on: ubuntu-latest
    steps:
      - name: Send signal to fork via API
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/OfficialPillipot/pillipot-webapp/dispatches \
          -d '{"event_type": "upstream_updated"}'
