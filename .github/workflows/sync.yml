# ──────────────────────────────────────────────────────────────
# Bi-directional Sync (Fork ↔ Upstream)
#
# 1. Pulls from Upstream → Fork (Handles Divergence with Merge)
# 2. Pushes from Fork → Upstream (Using UPSTREAM_TOKEN sync)
# ──────────────────────────────────────────────────────────────

name: Sync Fork and Upstream

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    name: Sync changes
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      workflows: write

    steps:
      # ── 1. Checkout the fork ──────────────────────────────
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Configure git identity ─────────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 3. Add upstream remote ────────────────────────────
      - name: Add upstream and fetch
        run: |
          UPSTREAM_URL="https://github.com/ginilmathew/pillipot-webapp.git"
          
          # Construct authenticated URL using the UPSTREAM_TOKEN secret for push access
          AUTH_UPSTREAM="https://x-access-token:${{ secrets.UPSTREAM_TOKEN }}@github.com/ginilmathew/pillipot-webapp.git"
          
          echo "Syncing with: $UPSTREAM_URL"
          git remote add upstream "$AUTH_UPSTREAM"
          git fetch upstream main --quiet

      # ── 4. SYNC: UPSTREAM -> FORK ──────────────────────────
      - name: Pull from Upstream
        run: |
          UPSTREAM_COMMITS=$(git rev-list HEAD..upstream/main --count)
          if [ "$UPSTREAM_COMMITS" -gt 0 ]; then
            echo "⬇️ Merging $UPSTREAM_COMMITS new commits from Upstream..."
            # Using standard merge (allowing divergence) to ensure the fork gets updates
            git merge upstream/main --no-edit
            git push origin main
          else
            echo "✅ Fork is already up-to-date with Upstream."
          fi

      # ── 5. SYNC: FORK -> UPSTREAM ──────────────────────────
      - name: Push to Upstream
        run: |
          FORK_COMMITS=$(git rev-list upstream/main..HEAD --count)
          if [ "$FORK_COMMITS" -gt 0 ]; then
            echo "⬆️ Pushing $FORK_COMMITS new commits to Upstream..."
            # Authenticated push back to the parent repo
            git push upstream main
          else
            echo "✅ Upstream is already up-to-date with Fork."
          fi
